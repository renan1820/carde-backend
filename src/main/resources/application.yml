spring:
  application:
    name: carde-api
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
    cache-names:
      - vehicles
      - vehicle-by-id
      - events
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      base-path: /api/v1
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /api/v1/swagger-ui.html
  show-actuator: false

carde:
  cdn:
    base-url: ${CDN_BASE_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-min-32-chars-long-for-local-only}
