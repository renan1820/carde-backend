name: CI/CD — Carde API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1: Testes com PostgreSQL real (sem mock de banco)
  # ───────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: carde_test
          POSTGRES_USER: carde
          POSTGRES_PASSWORD: carde123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/carde_test
          SPRING_DATASOURCE_USERNAME: carde
          SPRING_DATASOURCE_PASSWORD: carde123
          SPRING_PROFILES_ACTIVE: test
        run: mvn test -B

  # ───────────────────────────────────────────────────────────
  # JOB 2: Build da imagem Docker e push para GHCR
  # Roda apenas em push (não em PRs)
  # ───────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-,format=short

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────
  # JOB 3: Deploy em Homologação (branch develop)
  # ───────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Homologação
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Instalar Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy no Koyeb (staging)
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          koyeb services update carde-api/carde-api \
            --docker "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop" \
            --env "DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}" \
            --env "DATABASE_USER=${{ secrets.DATABASE_USER_STAGING }}" \
            --env "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD_STAGING }}" \
            --env "CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}" \
            --env "SPRING_PROFILES_ACTIVE=prod"

  # ───────────────────────────────────────────────────────────
  # JOB 4: Deploy em Produção (branch main)
  # ───────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Produção
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Instalar Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | bash
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy no Koyeb (produção)
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          koyeb services update carde-api/carde-api \
            --docker "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" \
            --env "DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            --env "DATABASE_USER=${{ secrets.DATABASE_USER_PROD }}" \
            --env "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD_PROD }}" \
            --env "CDN_BASE_URL=${{ secrets.CDN_BASE_URL }}" \
            --env "SPRING_PROFILES_ACTIVE=prod"
