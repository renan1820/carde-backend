services:
  postgres:
    image: postgres:16-alpine
    container_name: carde_postgres
    environment:
      POSTGRES_DB: carde_dev
      POSTGRES_USER: carde
      POSTGRES_PASSWORD: carde123
    ports:
      - "5432:5432"
    volumes:
      - carde_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carde -d carde_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  carde_postgres_data:
